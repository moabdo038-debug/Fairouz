<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة فيروز ❤️</title>
    <!-- استيراد خط القاهرة للتنسيق العربي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-color: #ff54a4;
            --green-color: #92d050;
            --bg-dark: #0d1117;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        .header {
            color: white;
            font-size: 2.2rem;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 900;
        }

        .header span {
            color: var(--green-color);
        }

        .card {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            position: relative;
            z-index: 10;
        }

        .image-box {
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 20px;
            object-fit: contain;
        }

        h2 {
            font-size: 1.6rem;
            color: #1a1a1a;
            margin-bottom: 35px;
            min-height: 4rem;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            min-height: 60px;
            position: relative;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s ease;
            min-width: 120px;
            background-color: var(--pink-color);
            color: white;
            box-shadow: 0 8px 15px rgba(255, 84, 164, 0.3);
        }

        #noBtn {
            transition: all 0.15s ease-out;
            /* في البداية يكون بجانب زر نعم */
        }

        /* قلوب متطايرة */
        .heart {
            position: fixed;
            font-size: 26px;
            pointer-events: none;
            animation: floatUp 3s linear forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 class="header">لعبة <span>فيروز</span> الخاصة ❤️</h1>

    <div class="card">
        <div class="image-box">
            <!-- الجيف الأول ثابت للصفحة الأولى -->
            <img id="displayImg" src="https://i.ibb.co/PZr64gcb/milk-and-mocha-2.gif" alt="جيف البداية">
        </div>

        <h2 id="questionText">ممكن تديني رقم الواتساب يا فيروز؟ 🥺</h2>

        <div class="btn-group" id="actions">
            <button class="btn" id="yesBtn">أكيد طبعاً</button>
            <button class="btn" id="noBtn">لأ</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionText = document.getElementById('questionText');
        const displayImg = document.getElementById('displayImg');
        const actions = document.getElementById('actions');

        const noMessages = [
            "أكيد بتهزري؟ 😂",
            "طب فكري تاني كدا..",
            "مبناخدش (لأ) هنا يا فوزة",
            "الزرار ده بايظ دوسي التاني",
            "والله ما هسيبك غير لما تدوسي أيوة",
            "هتندمي يا فيروز هههه",
            "يا بنتي وافقي بقا!"
        ];

        let noCount = 0;

        // وظيفة تحريك زر "لأ" وتغيير الكلام
        function handleNoAction() {
            // حساب أبعاد عشوائية للبقاء داخل الشاشة
            const maxX = window.innerWidth - noBtn.offsetWidth - 50;
            const maxY = window.innerHeight - noBtn.offsetHeight - 50;
            
            const x = Math.max(25, Math.floor(Math.random() * maxX));
            const y = Math.max(25, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // تغيير الجمل فقط (الجيف يظل ثابت كما طلب بودا)
            questionText.innerText = noMessages[noCount % noMessages.length];
            noCount++;
        }

        noBtn.addEventListener('mouseover', handleNoAction);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleNoAction();
        });

        // عند الضغط على "أيوة"
        yesBtn.addEventListener('click', () => {
            // تغيير الكلام والجيف (الحضن)
            questionText.innerText = "كنت عارف إن قلبك أبيض يا فيروز! 😍❤️";
            displayImg.src = "https://i.ibb.co/Ngv3PgCk/abra-ourso.gif"; 
            
            // إخفاء الأزرار
            noBtn.style.display = 'none';
            yesBtn.style.display = 'none';

            // إطلاق تأثير القلوب
            for(let i=0; i<40; i++) {
                setTimeout(createHeart, i * 100);
            }

            // مفاجأة التحويل للواتساب بعد 3 ثواني بالضبط
            setTimeout(() => {
                const phoneNumber = "201552729311";
                const textMessage = encodeURIComponent("بحبك يا بودا ❤️");
                window.location.href = `https://wa.me/${phoneNumber}?text=${textMessage}`;
            }, 3000);
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
    </script>
</body>
</html>
